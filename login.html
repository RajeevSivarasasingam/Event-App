<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Events Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col justify-center bg-slate-50">

    <div id="message-box"></div>

    <div class="w-full max-w-md mx-auto px-4">
        <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-100">
            <div class="text-center mb-8">
                <div class="font-bold text-2xl text-indigo-600 flex items-center justify-center gap-2 mb-4">
                    <span>📅</span> EventPortal
                </div>
                <h1 class="text-3xl font-bold text-slate-900 mb-2">Welcome Back</h1>
                <p class="text-slate-500 text-sm">Sign in to manage and discover campus events.</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="login-email" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="login-password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition flex justify-center items-center gap-2">
                    <span>Sign In</span>
                    <div id="login-loader" class="loader hidden"></div>
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-slate-500">
                Don't have an account? <a href="register.html" class="text-indigo-600 font-semibold hover:underline">Register here</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
